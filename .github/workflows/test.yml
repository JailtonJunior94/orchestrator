name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit:
    name: Unit tests
    strategy:
      matrix:
        os: [ ubuntu-24.04, macos-15 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Cobertura total: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 75" | bc -l)" = "1" ]; then
            echo "Cobertura ${COVERAGE}% abaixo do threshold minimo de 75%"
            exit 1
          fi

      - name: Coverage por pacote critico
        continue-on-error: true
        run: bash scripts/check-package-coverage.sh 70

      - name: Verificar snapshots atualizados
        run: |
          go test ./internal/contextgen/... -run TestSnapshot 2>&1 || {
            echo "Snapshots desatualizados. Execute: UPDATE_SNAPSHOTS=1 make test"
            exit 1
          }

      - name: Fuzz (opcional)
        continue-on-error: true
        run: |
          go test -fuzz=FuzzParseFrontmatter -fuzztime=10s ./internal/skills/
          go test -fuzz=FuzzParseTaskFile -fuzztime=10s ./internal/taskloop/
          go test -fuzz=FuzzValidateBugReport -fuzztime=10s ./internal/bugschema/
          go test -fuzz=FuzzParseConfig -fuzztime=10s ./internal/config/
          go test -fuzz=FuzzParseManifest -fuzztime=10s ./internal/manifest/
          go test -fuzz=FuzzDetectLanguages -fuzztime=10s ./internal/detect/
          go test -fuzz=FuzzDetectToolchain -fuzztime=10s ./internal/detect/

  lint:
    name: Lint
    strategy:
      matrix:
        os: [ ubuntu-24.04, macos-15 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: make lint

  integration:
    name: Integration tests
    needs: unit
    strategy:
      matrix:
        os: [ ubuntu-24.04, macos-15 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Integration tests
        run: go test -tags=integration ./internal/integration/... ./internal/skills/...

      - name: Budget
        run: make budget
