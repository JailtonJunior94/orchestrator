version: 2

project_name: ai-spec

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: ai-spec
    main: ./main.go
    binary: ai-spec
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/JailtonJunior94/ai-spec-harness/internal/version.Version={{.Version}}
      - -X github.com/JailtonJunior94/ai-spec-harness/internal/version.Commit={{.Commit}}
      - -X github.com/JailtonJunior94/ai-spec-harness/internal/version.Date={{.Date}}

archives:
  - id: ai-spec-archive
    ids:
      - ai-spec
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  # Avoid depending on GitHub compare API immediately after pushing a fresh tag.
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: ai-spec
    ids:
      - ai-spec-archive
    repository:
      owner: JailtonJunior94
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/JailtonJunior94/orchestrator"
    description: "CLI para governanca de IA em projetos de software"
    license: "MIT"
    install: |
      bin.install "ai-spec"
    post_install: |
      system "xattr", "-dr", "com.apple.quarantine", "#{bin}/ai-spec"

release:
  github:
    owner: JailtonJunior94
    name: orchestrator
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
